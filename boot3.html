<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Masonry Grid</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="boot3.css">

</head>

<body>

<div class="container py-5">

<h1 class="text-center text-white mb-5">Masonry Gallery Grid</h1>

<div class="masonry-grid">

<div class="item tall bg-danger text-white">1 (Tall)</div>

<div class="item bg-warning">2</div>

<div class="item tall bg-warning-subtle">3 (Tall)</div>

<div class="item wide bg-success text-white">4 (Wide)</div>

<div class="item bg-primary text-white">5</div>
<div class="item bg-pink">8</div>

<div class="item tall bg-info text-white">6 (Tall)</div>

<div class="item wide bg-purple">7 (Wide)</div>



</div>

</div>

</body>
</html>
